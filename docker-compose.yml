services:
  kfturbo-status:
    build:
      context: .
    image: kfturbo-status:local
    container_name: kfturbo-status
    restart: unless-stopped
    ports:
      - "${KF_LISTEN_PORT:-9999}:${KF_LISTEN_PORT:-9999}/tcp"
      # Optional: expose only if http_port is enabled in serverstatusconfig.json
      - "${KF_HTTP_PORT:-8080}:${KF_HTTP_PORT:-8080}/tcp"
    volumes:
      - ./serverstatusconfig.json:/app/serverstatusconfig.json:ro
      - ./serverembedconfig.json:/app/serverembedconfig.json:ro
      - ./serverportalconfig.json:/app/serverportalconfig.json:ro
